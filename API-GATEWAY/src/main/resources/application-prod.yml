frontend:
  url: ${FRONTEND_URL}

spring:
  config:
    activate:
      on-profile: prod
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-access-svc.duka.svc.cluster.local:8022/ # user service name on k8s cluster
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
            - AddRequestHeader=X-Gateway-Key, ${USER_ACCESS_TOKEN}

        - id: products-service
          uri: http://product-svc.duka.svc.cluster.local:8024/ # product service name on k8s cluster
          predicates:
            - Path=/product/**
          filters:
            - StripPrefix=1
            - AddRequestHeader=X-Gateway-Key, ${PRODUCTS_TOKEN}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.cloud.gateway: FALSE
    org.springframework.web: FALSE
    reactor.netty.http.client: FALSE
    reactor.netty.http.server: FALSE