user.access.token=${USER_ACCESS_TOKEN}

##############################
####  AUTH CONFIGURATION  ####
##############################
jwt.secret=${JWT_SECRET}

jwt.accessTokenValidity=${JWT_ACCESS_TOKEN_VALIDITY}
jwt.refreshTokenValidity=${JWT_REFRESH_TOKEN_VALIDITY}

encryption.password=${ENCRYPTION_PASSWORD}
encryption.salt=${ENCRYPTION_SALT}

# Hibernate (JPA) Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Database configuration
###############################
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver